version: '3.8'

# 从 server/.env 加载变量（供 docker compose 插值使用）
# 运行前确保 server/.env 存在

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: schedule_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhinengpaike
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # 优化PostgreSQL内存使用
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
      - ./postgres.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    networks:
      - schedule_network
    # 资源限制 - 数据库分配1GB内存
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zhinengpaike"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: schedule_server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/zhinengpaike?schema=public
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - schedule_network
    # 资源限制 - 后端分配1GB内存
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'
        reservations:
          memory: 256M
          cpus: '0.3'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 60s
      timeout: 15s
      retries: 3

  # 前端服务
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: schedule_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - schedule_network
    # 资源限制 - 前端分配512MB内存
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 60s
      timeout: 15s
      retries: 3

volumes:
  postgres_data:
    driver: local
  server_uploads:
    driver: local

networks:
  schedule_network:
    driver: bridge