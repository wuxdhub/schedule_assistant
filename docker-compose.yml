version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: schedule_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhinengpaike
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - schedule_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zhinengpaike"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: schedule_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-123456}@postgres:5432/zhinengpaike?schema=public
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL}
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - schedule_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: schedule_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - schedule_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  server_uploads:
    driver: local

networks:
  schedule_network:
    driver: bridge