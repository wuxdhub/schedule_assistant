# PostgreSQL 配置文件 - 针对2核4G服务器优化

# 内存设置
shared_buffers = 256MB                    # 共享缓冲区，约为总内存的25%
effective_cache_size = 1GB                # 操作系统缓存大小估计
work_mem = 8MB                           # 每个查询操作的内存
maintenance_work_mem = 64MB              # 维护操作内存

# 连接设置
listen_addresses = '*'                   # 监听所有网络接口，允许外部连接
max_connections = 50                     # 最大连接数，减少内存占用
superuser_reserved_connections = 3       # 超级用户保留连接

# WAL设置
wal_buffers = 8MB                        # WAL缓冲区
checkpoint_completion_target = 0.9       # 检查点完成目标
wal_writer_delay = 200ms                 # WAL写入延迟

# 查询规划器
random_page_cost = 1.1                   # SSD优化
effective_io_concurrency = 200           # SSD并发IO

# 日志设置
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning               # 只记录警告及以上级别
log_min_error_statement = error
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB

# 自动清理
autovacuum = on
autovacuum_max_workers = 2               # 减少自动清理工作进程
autovacuum_naptime = 60s                 # 自动清理间隔

# 统计信息
track_activities = on
track_counts = on
track_io_timing = on
track_functions = none

# 其他优化
shared_preload_libraries = ''            # 不预加载额外库
max_worker_processes = 4                 # 最大工作进程数
max_parallel_workers = 2                 # 最大并行工作进程
max_parallel_workers_per_gather = 1      # 每个Gather节点的并行工作进程

# 时区设置
timezone = 'Asia/Shanghai'
log_timezone = 'Asia/Shanghai'

# 字符集设置
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.simple'